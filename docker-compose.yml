version: '3.9'

services:
  kabal-bot:
    build: .
    container_name: kabal-volume-radar
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_PATH: /app/data/kabal.db
    volumes:
      - kabal-data:/app/data
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  kabal-data:
    driver: local
